[package]
name = 'pm_rs'
version = '0.1.0'
edition = '2021'

[lib]
crate-type = [ 'staticlib' ]
name = 'pm_rs'

[dependencies]
extendr-api = '*'
# pmcore = { path = "../../../PMcore", features = ["exa"] }
pmcore = { git = "https://github.com/LAPKB/PMcore", branch = "feat/new-bestdose-api", features = ["exa"] }
# pmcore = { version = "=0.22.1", features = ["exa"] }
libloading = "0.9"

rayon = "1.10.0"
anyhow = "1.0.97"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"

[profile.release]
panic = "unwind"
