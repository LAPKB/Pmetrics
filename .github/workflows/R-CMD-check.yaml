# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
name: R Package Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.os }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          cache-on-failure: true
          cache-all-crates: true

      - name: Warm Cargo registry (pre-fetch dependencies)
        shell: bash
        run: |
          # R CMD check copies the package to a throwaway dir and rebuilds
          # Rust from scratch there, so target/ artifacts can't be reused.
          # But ~/.cargo/registry and ~/.cargo/git ARE reused via the cache
          # above. Pre-fetching here populates that registry so the in-check
          # build skips all network/index work and resolves instantly.
          rustup run stable cargo fetch --manifest-path src/rust/Cargo.toml

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
          extra-repositories: https://lapkb.r-universe.dev

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::roxygen2
          needs: check
          dependencies: '"all"'
        continue-on-error: true
        id: install-deps

      - name: Retry Install dependencies
        if: steps.install-deps.outcome == 'failure'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::roxygen2
          needs: check
          dependencies: '"all"'

      - name: Verify roxygen outputs are current
        if: runner.os == 'Linux'
        run: |
          Rscript -e 'roxygen2::roxygenise()'
          if ! git diff --quiet man NAMESPACE inst/NEWS.Rd 2>/dev/null; then
            echo "::error::Run devtools::document() and commit regenerated Rd/NAMESPACE files."
            git diff --stat man NAMESPACE inst/NEWS.Rd
            exit 1
          fi
        shell: bash

      - name: Check package
        uses: r-lib/actions/check-r-package@v2
        with:
          error-on: "\"error\""
          args: "c(\"--no-manual\", \"--ignore-vignettes\", \"--as-cran\")"
          build_args: "c(\"--no-manual\", \"--no-build-vignettes\")"
